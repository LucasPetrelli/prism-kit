# GPIO is required for the phase-1 board LED smoke test and remains useful for
# later low-level timing bring-up work.
CONFIG_GPIO=y

# Keep a serial console available during early bring-up so failures in HAL or
# BAL are visible before the WS2812 path exists.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# Route the chosen console through the XIAO USB device controller so Zephyr
# logs and the OSHAL DebugPort share the primary CDC ACM transport while OSHAL
# owns composite registration for any additional CDC ACM channels.
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n

# Two CDC ACM instances share the UDC driver buffer pool by default on
# full-speed devices, which can starve the second instance of USB transfer
# buffers.  Use a dedicated pool sized for the number of instances so both
# COM ports can enqueue transfers concurrently.
CONFIG_USBD_CDC_ACM_BUF_POOL=y

# The GNU Arm Embedded toolchain available on this host provides newlib rather
# than Zephyr SDK picolibc integration, so select the matching libc explicitly.
CONFIG_NEWLIB_LIBC=y
# This firmware does not currently use dynamic allocation, so keep newlib's
# required heap floor small enough to preserve SRAM headroom during bring-up.
CONFIG_NEWLIB_LIBC_MIN_REQUIRED_HEAP_SIZE=1024

# A console-backed printk path is enough for the thin Zephyr-owned startup
# error path, and avoiding the deferred logging thread saves a meaningful chunk
# of SRAM on the SAMD21.
CONFIG_PRINTK=y
CONFIG_LOG=n

# APP is migrated first to C++. Zephyr still owns startup, while the current
# firmware stays on a conservative C++17 dialect that is broadly supported by
# embedded toolchains.
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_GLIBCXX_LIBCPP=y

# Assertions are cheap insurance during early architecture work where the goal
# is to validate layer boundaries before optimizing anything.
CONFIG_ASSERT=y

# Task runtime diagnostics need Zephyr to retain thread runtime counters and
# initialize stack memory so OSHAL can report CPU load samples plus stack
# watermark information for each task.
CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_INIT_STACKS=y
