# GPIO is required for the phase-1 board LED smoke test and remains useful for
# later low-level timing bring-up work.
CONFIG_GPIO=y

# Keep a serial console available during early bring-up so failures in HAL or
# BAL are visible before the WS2812 path exists.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# Route the chosen console through the XIAO USB device controller so Zephyr
# logs and the OSHAL DebugPort share the same CDC ACM transport.
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="XIAO SAMD21 Debug Console"

# The GNU Arm Embedded toolchain available on this host provides newlib rather
# than Zephyr SDK picolibc integration, so select the matching libc explicitly.
CONFIG_NEWLIB_LIBC=y

# Logging gives the thin Zephyr entry point a way to report bootstrap failures
# without leaking Zephyr-specific APIs into the app layer.
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y

# APP is migrated first to C++. Zephyr still owns startup, while the current
# firmware stays on a conservative C++17 dialect that is broadly supported by
# embedded toolchains.
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_GLIBCXX_LIBCPP=y

# Assertions are cheap insurance during early architecture work where the goal
# is to validate layer boundaries before optimizing anything.
CONFIG_ASSERT=y
